<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Database Management 复习考试</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #657282;
      --line: #d8dee7;
      --paper: #f6f8fb;
      --panel: #ffffff;
      --primary: #145da0;
      --primary-dark: #0e4478;
      --accent: #d17a22;
      --good: #16794c;
      --bad: #b42318;
      --warn: #8a5a00;
      --shadow: 0 14px 34px rgba(23, 33, 43, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
    }

    header {
      background: #0f2437;
      color: white;
      border-bottom: 5px solid var(--accent);
    }

    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 22px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 10px;
      color: #c8d3df;
      max-width: 760px;
    }

    .score-rule {
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 8px;
      padding: 12px 14px;
      min-width: 210px;
      color: #edf4fb;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    button, select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: white;
      color: var(--ink);
      padding: 8px 12px;
      font: inherit;
    }

    button {
      cursor: pointer;
      font-weight: 650;
    }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    button.primary:hover { background: var(--primary-dark); }
    button.ghost { background: transparent; }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .tabs {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: white;
    }

    .tabs button {
      border: 0;
      border-radius: 0;
      border-right: 1px solid var(--line);
    }

    .tabs button:last-child { border-right: 0; }
    .tabs button.active {
      background: #e9f2fb;
      color: var(--primary-dark);
    }

    .layout {
      display: grid;
      grid-template-columns: 270px 1fr;
      gap: 18px;
      align-items: start;
    }

    aside, .content {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    aside {
      position: sticky;
      top: 12px;
      padding: 16px;
    }

    .stat {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid #edf0f4;
    }

    .stat:last-child { border-bottom: 0; }
    .stat span:first-child { color: var(--muted); }
    .stat strong { font-size: 18px; }

    .content { padding: 18px; }

    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .hint { color: var(--muted); }

    .question {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px;
      margin: 12px 0;
      background: #fff;
    }

    .q-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef3f8;
      color: #445468;
    }

    .q-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .options {
      display: grid;
      gap: 8px;
    }

    label.option {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 8px;
      align-items: start;
      padding: 9px 10px;
      border: 1px solid #e2e7ef;
      border-radius: 7px;
      cursor: pointer;
      background: #fbfcfe;
    }

    label.option:hover { border-color: #aebbd0; }
    input[type="radio"] { margin-top: 4px; }

    .answer {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 7px;
      background: #f2f6fa;
      display: none;
    }

    .answer.show { display: block; }
    .correct { color: var(--good); font-weight: 700; }
    .wrong { color: var(--bad); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }

    .result-box {
      display: none;
      margin: 12px 0 16px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
    }

    .result-box.show { display: block; }
    .score-big {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary-dark);
      line-height: 1.1;
    }

    .bank-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    .chapter-tile {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      background: #fbfcfe;
    }

    .chapter-tile strong { display: block; }
    .chapter-tile span { color: var(--muted); font-size: 13px; }

    @media (max-width: 840px) {
      .topbar { grid-template-columns: 1fr; }
      .layout { grid-template-columns: 1fr; }
      aside { position: static; }
      .section-title { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Database Management 复习考试</h1>
        <div class="subtitle">基于 Downloads 最新课件文件夹 PDBM_Slides_PPT_ZH 生成，覆盖 20 个章节；每章至少 20 道中英双语选择题。</div>
      </div>
      <div class="score-rule">
        <strong>评分规则</strong><br>
        答对 +1 分，答错 -0.33 分，未答 0 分。模拟考试随机 20 题，满分 20。
      </div>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="tabs" aria-label="模式选择">
        <button id="tabExam" class="active" type="button">模拟考试</button>
        <button id="tabBank" type="button">题库练习</button>
      </div>
      <select id="chapterFilter" aria-label="章节筛选"></select>
      <button id="newExamBtn" class="primary" type="button">生成 20 题模拟卷</button>
      <button id="gradeBtn" type="button">交卷评分</button>
      <button id="showAnswersBtn" type="button">显示答案</button>
      <button id="resetBtn" class="ghost" type="button">清空作答</button>
    </div>

    <div class="layout">
      <aside>
        <div class="stat"><span>题库总量</span><strong id="totalCount">0</strong></div>
        <div class="stat"><span>当前题数</span><strong id="currentCount">0</strong></div>
        <div class="stat"><span>已答</span><strong id="answeredCount">0</strong></div>
        <div class="stat"><span>正确</span><strong id="correctCount">-</strong></div>
        <div class="stat"><span>错误</span><strong id="wrongCount">-</strong></div>
        <div class="stat"><span>得分</span><strong id="scoreCount">-</strong></div>
      </aside>

      <section class="content">
        <div class="section-title">
          <div>
            <h2 id="modeTitle">模拟考试</h2>
            <div class="hint" id="modeHint">随机 20 题；提交后显示得分和解析。</div>
          </div>
          <div class="hint" id="sourceHint">来源：20 个 PowerPoint 章节文本 · 中英双语题库</div>
        </div>
        <div id="resultBox" class="result-box"></div>
        <div id="chapterOverview" class="bank-grid" hidden></div>
        <div id="questions"></div>
      </section>
    </div>
  </main>

  <script>
    const BILINGUAL_CHAPTER_CONCEPTS = [
      { chapter: "第一章 数据库管理的基本概念", concepts: [
        ["数据库 / Database", "特定业务流程或问题情境中相关数据的集合 / a collection of related data for a business process or problem setting"],
        ["目标用户群 / Target user group", "数据库设计必须服务明确的用户群和应用程序 / database design must serve defined users and applications"],
        ["DBMS / Database Management System", "用于定义、创建、使用和维护数据库的软件包 / software for defining, creating, using, and maintaining databases"],
        ["数据库系统 / Database system", "数据库、DBMS、用户、应用和过程的组合 / the combination of database, DBMS, users, applications, and procedures"],
        ["文件系统方法 / File system approach", "把数据分散保存在应用文件中，容易产生冗余和不一致 / stores data in application files and often causes redundancy and inconsistency"],
        ["数据库系统方法 / Database approach", "通过共享数据库和 DBMS 降低应用与数据的耦合 / reduces coupling through a shared database and DBMS"],
        ["数据冗余 / Data redundancy", "相同数据被重复存储，增加不一致风险 / duplicate storage of the same data increases inconsistency risk"],
        ["数据不一致 / Data inconsistency", "同一事实在不同位置出现冲突值 / conflicting values for the same fact in different places"],
        ["程序-数据依赖 / Program-data dependence", "应用逻辑强依赖文件结构，结构变化会影响程序 / application logic depends tightly on file structure"],
        ["数据库模式 / Database schema", "对数据库结构、约束和关系的总体描述 / overall description of database structure, constraints, and relationships"],
        ["数据库状态 / Database state", "某一时刻数据库中的实际数据集合 / actual data stored at a particular moment"],
        ["数据模型 / Data model", "从特定角度描述数据、关系和约束的抽象工具 / an abstraction for data, relationships, and constraints"],
        ["概念数据模型 / Conceptual data model", "面向业务用户的高层数据描述 / high-level business-oriented description of data"],
        ["逻辑数据模型 / Logical data model", "把概念模型映射到特定数据模型，如关系模型 / maps a conceptual model to a model such as the relational model"],
        ["内部数据模型 / Internal data model", "描述数据物理存储、格式和访问路径 / describes physical storage, formats, and access paths"],
        ["外部数据模型 / External data model", "面向特定用户或应用的数据子集，也称视图 / user- or application-specific subset, also called a view"],
        ["目录 / Catalog", "保存模式、约束、视图和权限等元数据 / stores metadata such as schemas, constraints, views, and privileges"],
        ["数据库语言 / Database language", "用于定义、操纵、查询和控制数据库的语言 / language for defining, manipulating, querying, and controlling databases"],
        ["并发控制 / Concurrency control", "管理多个用户同时访问数据库的一致性 / manages consistency during simultaneous access"],
        ["数据库系统优势 / Database system advantages", "提高共享、一致性、查询能力和维护性 / improves sharing, consistency, querying, and maintainability"],
      ]},
      { chapter: "第二章 数据库体系结构和分类", concepts: [
        ["三层模式结构 / Three-schema architecture", "把数据库描述分为外模式、概念模式和内模式 / separates descriptions into external, conceptual, and internal schemas"],
        ["外模式 / External schema", "特定用户或应用看到的数据视图 / the data view seen by a specific user or application"],
        ["概念模式 / Conceptual schema", "整个数据库的逻辑结构描述 / logical description of the whole database"],
        ["内模式 / Internal schema", "数据库物理存储结构描述 / description of physical storage structures"],
        ["逻辑数据独立性 / Logical data independence", "概念模式变化尽量不影响外模式和应用 / conceptual changes should minimally affect external schemas and applications"],
        ["物理数据独立性 / Physical data independence", "内部存储变化尽量不影响逻辑层 / physical storage changes should minimally affect the logical layer"],
        ["集中式数据库 / Centralized database", "数据和 DBMS 主要集中在一个站点 / data and DBMS are mainly located at one site"],
        ["客户机-服务器体系结构 / Client-server architecture", "客户端请求服务，服务器管理数据库资源 / clients request services while servers manage database resources"],
        ["分布式数据库 / Distributed database", "逻辑相关的数据分布在多个站点 / logically related data distributed across multiple sites"],
        ["并行数据库 / Parallel database", "利用多个处理器或磁盘并行执行数据库操作 / uses multiple processors or disks for parallel operations"],
        ["云数据库 / Cloud database", "数据库服务部署在云基础设施上 / database service deployed on cloud infrastructure"],
        ["同构分布式系统 / Homogeneous distributed system", "各站点使用相同或兼容的 DBMS / sites use the same or compatible DBMS"],
        ["异构分布式系统 / Heterogeneous distributed system", "站点可能使用不同 DBMS、模型或平台 / sites may use different DBMSs, models, or platforms"],
        ["数据库分类 / Database classification", "可按模型、用户数、位置、用途等分类 / can be classified by model, users, location, and purpose"],
        ["单用户数据库 / Single-user database", "一次主要服务一个用户或个人应用 / mainly serves one user or personal application at a time"],
        ["多用户数据库 / Multi-user database", "支持多个用户同时访问 / supports simultaneous access by multiple users"],
        ["事务处理系统 / Transaction processing system", "面向日常业务操作和高频更新 / supports daily operations and frequent updates"],
        ["决策支持系统 / Decision support system", "面向分析、汇总和管理决策 / supports analysis, summaries, and management decisions"],
        ["元数据 / Metadata", "关于数据的数据，描述含义、结构和约束 / data about data describing meaning, structure, and constraints"],
        ["体系结构分层 / Architectural layering", "通过分层隐藏复杂性并支持独立演化 / hides complexity and supports independent evolution"],
      ]},
      { chapter: "第三章 应用ER和UML构建概念数据模型", concepts: [
        ["实体 / Entity", "业务环境中可区分并需要保存数据的对象或概念 / distinguishable object or concept about which data is stored"],
        ["实体类型 / Entity type", "具有相同属性的一组实体的定义 / definition of a set of entities with the same attributes"],
        ["属性 / Attribute", "描述实体或联系的特征 / property describing an entity or relationship"],
        ["简单属性 / Simple attribute", "不能再有意义地分解的属性 / attribute that cannot be meaningfully decomposed"],
        ["复合属性 / Composite attribute", "可分解为多个子属性的属性 / attribute that can be divided into subattributes"],
        ["多值属性 / Multivalued attribute", "一个实体实例可拥有多个值的属性 / attribute that can have multiple values for one entity"],
        ["派生属性 / Derived attribute", "可由其他数据计算得到的属性 / attribute computed from other data"],
        ["键属性 / Key attribute", "可唯一标识实体实例的属性 / attribute that uniquely identifies entity instances"],
        ["联系 / Relationship", "实体之间具有业务含义的关联 / meaningful association between entities"],
        ["联系类型 / Relationship type", "同类联系实例的定义 / definition of similar relationship instances"],
        ["基数约束 / Cardinality constraint", "规定实体参与联系的数量限制 / specifies numerical participation limits"],
        ["参与约束 / Participation constraint", "规定实体参与联系是全部还是部分 / specifies total or partial participation"],
        ["弱实体 / Weak entity", "依赖拥有者实体识别的实体 / entity identified through an owner entity"],
        ["识别联系 / Identifying relationship", "连接弱实体和其拥有者的联系 / relationship connecting a weak entity with its owner"],
        ["EER 模型 / Enhanced ER model", "扩展 ER 以表达泛化、特化和继承 / extends ER with generalization, specialization, and inheritance"],
        ["泛化 / Generalization", "从多个实体类型抽象出共同超类型 / abstracts common supertype from multiple entity types"],
        ["特化 / Specialization", "把超类型划分为更具体的子类型 / divides a supertype into specific subtypes"],
        ["UML 类 / UML class", "描述对象类型、属性和操作的建模元素 / modeling element for object type, attributes, and operations"],
        ["UML 关联 / UML association", "类之间的结构关系 / structural relationship between classes"],
        ["概念建模质量 / Conceptual modeling quality", "应准确反映业务语义并避免实现细节过早进入 / should reflect business semantics and avoid premature implementation details"],
      ]},
      { chapter: "第四章 数据管理的组织层面", concepts: [
        ["数据管理 / Data management", "规划、控制和交付数据资源价值的组织活动 / organizational activities for planning, controlling, and delivering data value"],
        ["数据治理 / Data governance", "围绕数据决策权、责任和政策建立制度 / establishes decision rights, accountability, and policies for data"],
        ["数据管理员 / Data administrator", "关注组织层面数据资源、标准和政策 / focuses on enterprise data resources, standards, and policies"],
        ["数据库管理员 / Database administrator", "关注 DBMS 安装、运行、性能和安全 / focuses on DBMS installation, operation, performance, and security"],
        ["数据所有者 / Data owner", "对某类数据的业务定义和使用承担责任 / accountable for business definition and use of data"],
        ["数据管家 / Data steward", "执行数据标准、质量监控和协调工作 / executes standards, quality monitoring, and coordination"],
        ["数据标准 / Data standards", "规定命名、格式、定义和质量要求 / specify naming, formats, definitions, and quality requirements"],
        ["数据政策 / Data policies", "规定数据访问、保留、共享和合规原则 / define principles for access, retention, sharing, and compliance"],
        ["数据战略 / Data strategy", "把数据管理目标与组织目标对齐 / aligns data management goals with organizational goals"],
        ["数据架构 / Data architecture", "描述组织数据结构、流动和集成蓝图 / blueprint for data structures, flows, and integration"],

        ["数据质量管理 / Data quality management", "持续度量和改进数据适用性 / continuously measures and improves fitness for use"],
        ["访问控制 / Access control", "确保只有授权主体访问相应数据 / ensures only authorized subjects access data"],
        ["隐私保护 / Privacy protection", "控制个人数据收集、使用和披露 / controls collection, use, and disclosure of personal data"],

      { chapter: "第六章 关系数据库", concepts: [

    const COMMON_DISTRACTORS = [
      "它主要用于替代所有业务需求分析。 / It mainly replaces all business requirements analysis.",
      "它只影响界面颜色，不影响数据结构或数据管理。 / It only affects interface colors, not data structures or data management.",
      "它表示系统不再需要一致性、安全性或性能设计。 / It means the system no longer needs consistency, security, or performance design.",
      "它只适用于单用户文本文件，不适用于数据库系统。 / It applies only to single-user text files, not database systems.",
      "它的主要作用是删除所有元数据和约束。 / Its main role is to remove all metadata and constraints.",
      "它保证任何查询都不需要索引、事务或优化。 / It guarantees that no query needs indexes, transactions, or optimization."
    ];

    function buildBilingualQuestionBank() {
      const bank = [];
      BILINGUAL_CHAPTER_CONCEPTS.forEach((chapter, chapterIndex) => {
        chapter.concepts.forEach(([term, definition], conceptIndex) => {
          const distractors = [0, 1, 2].map(offset => {
            const pick = (chapterIndex * 7 + conceptIndex * 3 + offset) % COMMON_DISTRACTORS.length;
            return COMMON_DISTRACTORS[pick];
          });
          bank.push({
            chapter: chapter.chapter,
            q: `关于“${term}”，哪项说法正确？ / Which statement about "${term}" is correct?`,
            options: [
              `${definition}。`,
              ...distractors
            ],
            answer: 0,
            exp: `答案说明 / Explanation: ${definition}。`
          });
        });
      });
      return bank;
    }

    const RAW_QUESTION_BANK = buildBilingualQuestionBank();

    function seededShuffle(items, seed) {
      const copy = items.slice();
      let value = seed + 37;
      for (let i = copy.length - 1; i > 0; i--) {
        value = (value * 1664525 + 1013904223) >>> 0;
        const j = value % (i + 1);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    const QUESTION_BANK = RAW_QUESTION_BANK.map((question, index) => {
      const keyedOptions = question.options.map((text, optionIndex) => ({
        text,
        isCorrect: optionIndex === question.answer
      }));
      const shuffled = seededShuffle(keyedOptions, index);
      return {
        ...question,
        options: shuffled.map(option => option.text),
        answer: shuffled.findIndex(option => option.isCorrect)
      };
    });

    const state = {
      mode: "exam",
      examQuestions: [],
      visibleQuestions: [],
      answers: new Map(),
      graded: false,
      showAnswers: false
    };

    const els = {
      tabExam: document.getElementById("tabExam"),
      tabBank: document.getElementById("tabBank"),
      chapterFilter: document.getElementById("chapterFilter"),
      newExamBtn: document.getElementById("newExamBtn"),
      gradeBtn: document.getElementById("gradeBtn"),
      showAnswersBtn: document.getElementById("showAnswersBtn"),
      resetBtn: document.getElementById("resetBtn"),
      questions: document.getElementById("questions"),
      resultBox: document.getElementById("resultBox"),
      totalCount: document.getElementById("totalCount"),
      currentCount: document.getElementById("currentCount"),
      answeredCount: document.getElementById("answeredCount"),
      correctCount: document.getElementById("correctCount"),
      wrongCount: document.getElementById("wrongCount"),
      scoreCount: document.getElementById("scoreCount"),
      modeTitle: document.getElementById("modeTitle"),
      modeHint: document.getElementById("modeHint"),
      chapterOverview: document.getElementById("chapterOverview")
    };

    function shuffle(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function optionLetter(index) {
      return ["A", "B", "C", "D"][index];
    }

    function buildChapterFilter() {
      const chapters = [...new Set(QUESTION_BANK.map(item => item.chapter))];
      els.chapterFilter.innerHTML = [
        '<option value="all">全部章节</option>',
        ...chapters.map(chapter => `<option value="${chapter}">${chapter}</option>`)
      ].join("");

      const counts = chapters.map(chapter => {
        const count = QUESTION_BANK.filter(q => q.chapter === chapter).length;
        return `<div class="chapter-tile"><strong>${chapter}</strong><span>${count} 道题</span></div>`;
      });
      els.chapterOverview.innerHTML = counts.join("");
    }

    function newExam() {
      const selectedChapter = els.chapterFilter.value;
      const pool = selectedChapter === "all"
        ? QUESTION_BANK
        : QUESTION_BANK.filter(q => q.chapter === selectedChapter);
      state.examQuestions = shuffle(pool).slice(0, Math.min(20, pool.length));
      state.answers.clear();
      state.graded = false;
      state.showAnswers = false;
      render();
    }

    function setMode(mode) {
      state.mode = mode;
      state.answers.clear();
      state.graded = false;
      state.showAnswers = false;
      if (mode === "exam" && state.examQuestions.length === 0) {
        newExam();
        return;
      }
      render();
    }

    function currentQuestions() {
      if (state.mode === "exam") return state.examQuestions;
      const selectedChapter = els.chapterFilter.value;
      return selectedChapter === "all"
        ? QUESTION_BANK
        : QUESTION_BANK.filter(q => q.chapter === selectedChapter);
    }

    function grade() {
      state.graded = true;
      state.showAnswers = true;
      render();
    }

    function computeStats(questions) {
      let correct = 0;
      let wrong = 0;
      let unanswered = 0;
      questions.forEach((question, index) => {
        const selected = state.answers.get(index);
        if (selected === undefined) unanswered += 1;
        else if (selected === question.answer) correct += 1;
        else wrong += 1;
      });
      return {
        correct,
        wrong,
        unanswered,
        answered: correct + wrong,
        score: correct - wrong * 0.33
      };
    }

    function renderStats(questions) {
      const stats = computeStats(questions);
      els.totalCount.textContent = QUESTION_BANK.length;
      els.currentCount.textContent = questions.length;
      els.answeredCount.textContent = stats.answered;
      els.correctCount.textContent = state.graded ? stats.correct : "-";
      els.wrongCount.textContent = state.graded ? stats.wrong : "-";
      els.scoreCount.textContent = state.graded ? stats.score.toFixed(2) : "-";
    }

    function renderResult(questions) {
      if (!state.graded) {
        els.resultBox.classList.remove("show");
        els.resultBox.innerHTML = "";
        return;
      }
      const stats = computeStats(questions);
      const maxScore = state.mode === "exam" ? questions.length : questions.length;
      els.resultBox.innerHTML = `
        <div class="score-big">${stats.score.toFixed(2)} / ${maxScore}</div>
        <div>正确 ${stats.correct} 题，错误 ${stats.wrong} 题，未答 ${stats.unanswered} 题。</div>
        <div class="hint">计分公式：${stats.correct} × 1 - ${stats.wrong} × 0.33 = ${stats.score.toFixed(2)}。未答不扣分。</div>
      `;
      els.resultBox.classList.add("show");
    }

    function renderQuestions(questions) {
      els.questions.innerHTML = questions.map((question, index) => {
        const selected = state.answers.get(index);
        const answerVisible = state.showAnswers || state.graded;
        const status = selected === undefined
          ? '<span class="warn">未答</span>'
          : selected === question.answer
            ? '<span class="correct">正确</span>'
            : '<span class="wrong">错误</span>';
        const options = question.options.map((option, optionIndex) => {
          const checked = selected === optionIndex ? "checked" : "";
          return `
            <label class="option">
              <input type="radio" name="q${index}" value="${optionIndex}" ${checked}>
              <span><strong>${optionLetter(optionIndex)}.</strong> ${option}</span>
            </label>
          `;
        }).join("");

        return `
          <article class="question">
            <div class="q-meta">
              <span class="tag">${question.chapter}</span>
              <span>第 ${index + 1} 题</span>
              ${state.graded ? `<span>${status}</span>` : ""}
            </div>
            <div class="q-title">${question.q}</div>
            <div class="options" data-question="${index}">${options}</div>
            <div class="answer ${answerVisible ? "show" : ""}">
              <strong>答案：${optionLetter(question.answer)}.</strong> ${question.options[question.answer]}<br>
              <span class="hint">${question.exp}</span>
            </div>
          </article>
        `;
      }).join("");

      els.questions.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener("change", event => {
          const wrapper = event.target.closest(".options");
          state.answers.set(Number(wrapper.dataset.question), Number(event.target.value));
          state.graded = false;
          renderStats(questions);
          els.resultBox.classList.remove("show");
        });
      });
    }

    function render() {
      els.tabExam.classList.toggle("active", state.mode === "exam");
      els.tabBank.classList.toggle("active", state.mode === "bank");
      els.newExamBtn.hidden = state.mode !== "exam";
      els.gradeBtn.textContent = state.mode === "exam" ? "交卷评分" : "检查练习";
      els.modeTitle.textContent = state.mode === "exam" ? "模拟考试" : "题库练习";
      els.modeHint.textContent = state.mode === "exam"
        ? "随机 20 题；提交后显示得分和解析。"
        : "可按章节筛选，随时检查答案。";
      els.chapterOverview.hidden = state.mode !== "bank";

      const questions = currentQuestions();
      state.visibleQuestions = questions;
      renderStats(questions);
      renderResult(questions);
      renderQuestions(questions);
    }

    els.tabExam.addEventListener("click", () => setMode("exam"));
    els.tabBank.addEventListener("click", () => setMode("bank"));
    els.newExamBtn.addEventListener("click", newExam);
    els.gradeBtn.addEventListener("click", grade);
    els.showAnswersBtn.addEventListener("click", () => {
      state.showAnswers = !state.showAnswers;
      render();
    });
    els.resetBtn.addEventListener("click", () => {
      state.answers.clear();
      state.graded = false;
      state.showAnswers = false;
      render();
    });
    els.chapterFilter.addEventListener("change", () => {
      if (state.mode === "exam") newExam();
      else {
        state.answers.clear();
        state.graded = false;
        state.showAnswers = false;
        render();
      }
    });

    buildChapterFilter();
    newExam();
  </script>
